services:
  postgres:
    image: postgres:16-alpine
    container_name: duaduainterior-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: duaduainterior
    ports:
      - "5432:5432"
    volumes:
      - duaduainterior_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d duaduainterior"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  duaduainterior_pg_data:
